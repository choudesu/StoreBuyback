name: CI Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Compute dev version
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "DEV_VERSION=1.0-${SHORT_SHA}" >> $GITHUB_ENV

      - name: Build
        run: mvn clean package -Drevision=${{ env.DEV_VERSION }}

      - name: Upload dev build
        uses: actions/upload-artifact@v4
        with:
          name: StoreByback-dev-${{ env.DEV_VERSION }}
          path: target/StoreByback-*.jar
          if-no-files-found: error
          retention-days: 30
